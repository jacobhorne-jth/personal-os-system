name: Supabase keepalive

on:
  schedule:
    - cron: "0 8 * * 1,4" # Mondays and Thursdays 8:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase so the project stays active
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/responsibilities?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $status"
          if [ "$status" -ge 500 ] || [ "$status" -eq 000 ]; then
            echo "Project unreachable — it may be paused" >&2
            exit 1
          fi
